<!DOCTYPE html>
<html lang="it">
<head>
    <title>My Anime Stream</title>
    <style>
        body { background: #111; color: white; font-family: sans-serif; display: flex; gap: 20px; padding: 20px; flex-wrap: wrap; }
        .card { border: 1px solid #333; padding: 15px; border-radius: 8px; background: #222; width: 250px; text-align: center; }
        button { background: #e50914; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 5px; margin-top: 10px; }
        iframe { width: 100%; height: 500px; display: none; margin-top: 20px; border: none; }
    </style>
</head>
<body>

<div id="anime-list"></div>
<iframe id="video-player" allowfullscreen></iframe>

<script>
    // La tua lista di anime
    const animeData = [
      { "mal_id": 5114, "title": "Fullmetal Alchemist: Brotherhood" },
      { "mal_id": 16498, "title": "Attack on Titan" },
      { "mal_id": 9253, "title": "Steins;Gate" }
    ];

    const container = document.getElementById('anime-list');
    const player = document.getElementById('video-player');

    animeData.forEach(anime => {
        const card = document.createElement('div');
        card.className = 'card';
        // Creiamo il link al player (esempio con un aggregatore comune)
        const videoLink = `https://vidsrc.to{anime.mal_id}`; 
        
        card.innerHTML = `
            <h3>${anime.title}</h3>
            <button onclick="playVideo('${videoLink}')">Guarda Ora</button>
        `;
        container.appendChild(card);
    });

    function playVideo(url) {
        player.src = url;
        player.style.display = 'block';
        window.scrollTo(0, document.body.scrollHeight);
    }
</script>
</body>
</html>
